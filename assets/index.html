<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AI Trip Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: '#E78D0C',
        },
        fontFamily: {
          poppins: ['Poppins', 'sans-serif'],
        },
        keyframes: {
          blink: {
            '0%, 100%': { opacity: '0.2' },
            '50%': { opacity: '1' },
          }
        },
        animation: {
          blink: 'blink 1.2s infinite',
        }
      }
    }
  }
</script>
</head>

<body class="m-0 font-poppins bg-white text-[#111] flex h-screen">

<div class="flex-1 flex flex-col">
 
<div class="flex-1 flex flex-col items-center justify-center text-center" id="start">

    <div class="text-[50px] font-extrabold">
        Let's plan your trip.<span class="text-[30px] block text-brand"> Which country are you visiting? </span>
    </div>

    <div class="mt-[25px] w-[650px] max-w-[90%] border border-[#e5e5e5] rounded-[12px] p-[20px] bg-[#fafafa]">
        <div class="flex gap-[6px] mb-[10px]" id="start-ki">
            <button class="border border-black bg-white hover:bg-brand py-[10px] px-[18px] rounded-[8px] cursor-pointer" onclick="startChatQ(this)">Ghana</button>
            <button class="border border-black bg-white hover:bg-brand py-[10px] px-[18px] rounded-[8px] cursor-pointer" onclick="startChatQ(this)">Togo</button>
            <button class="border border-black bg-white hover:bg-brand py-[10px] px-[18px] rounded-[8px] cursor-pointer" onclick="startChatQ(this)">Benin</button>
            <button class="border border-black bg-white hover:bg-brand py-[10px] px-[18px] rounded-[8px] cursor-pointer" onclick="startChatQ(this)">South Africa</button>
            <button class="border border-black bg-white hover:bg-brand py-[10px] px-[18px] rounded-[8px] cursor-pointer" onclick="startChatQ(this)">Ivory Coast</button>
        </div>
        
        <textarea class="w-full border-none resize-none outline-none text-[16px] bg-transparent" id="startInput" rows="2" placeholder="Where are we visiting?"></textarea>

        <div class="flex justify-end mt-[10px]">
            <button class="bg-brand text-white py-[10px] px-[18px] rounded-[8px] cursor-pointer" onclick="startChat()">Start</button>
        </div>
    </div>

</div>

<div class="hidden flex-col h-full" id="chat">

    <div class="flex-1 overflow-y-auto pt-[30px] px-[30px] pb-[40vh] flex flex-col w-[850px] max-[850px]:w-full mx-auto gap-[18px]" id="messages"></div>

    <div class="border border-[#c2c0c0] rounded-[16px] p-[15px] flex flex-col gap-[10px] fixed bottom-[6px] w-auto left-1/2 -translate-x-1/2 bg-white z-[23456789098765]">
        <div class="flex gap-[6px] mb-[10px]" id="sgts"></div>
        <div class="w-full flex flex-col">
            <textarea class="rounded-[8px] p-[10px] w-[500px] border-none resize-none outline-none text-[16px] bg-transparent" id="chatInput" placeholder="Your reply.........." rows="3"></textarea>
            
            <svg class="bg-brand text-white p-[6px] aspect-square w-[35px] float-right rounded-full self-end cursor-pointer" onclick="send()" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path fill-rule="evenodd" clip-rule="evenodd" d="M12 3C12.2652 3 12.5196 3.10536 12.7071 3.29289L19.7071 10.2929C20.0976 10.6834 20.0976 11.3166 19.7071 11.7071C19.3166 12.0976 18.6834 12.0976 18.2929 11.7071L13 6.41421V20C13 20.5523 12.5523 21 12 21C11.4477 21 11 20.5523 11 20V6.41421L5.70711 11.7071C5.31658 12.0976 4.68342 12.0976 4.29289 11.7071C3.90237 11.3166 3.90237 10.6834 4.29289 10.2929L11.2929 3.29289C11.4804 3.10536 11.7348 3 12 3Z" fill="#ffffff"></path> </g></svg>
        </div>
    </div>

</div>

</div>
<div id="modalOverlay" class="fixed z-[234567890987658] inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
    <div class="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden transform transition-all flex flex-col max-h-[90vh]">
        
        <div class="px-6 py-4 border-b border-zinc-100 flex justify-between items-center bg-white">
            <h3 class="text-lg font-bold text-zinc-900">Edit Itinerary</h3>
            <button onclick="toggleModal()" class="text-zinc-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="p-6 overflow-y-auto bg-white">
            <form id="editForm" class="flex flex-col gap-4 text-[14px]">
                <div>
                    <label class="block text-zinc-500 font-medium mb-1 uppercase tracking-wider text-[11px]">Destination Country</label>
                    <input type="text" id="edit-country" class="w-full border border-zinc-200 rounded-lg p-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all">
                </div>
                <div>
                    <label class="block text-zinc-500 font-medium mb-1 uppercase tracking-wider text-[11px]">Focus / Activities</label>
                    <input type="text" id="edit-activities" class="w-full border border-zinc-200 rounded-lg p-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-zinc-500 font-medium mb-1 uppercase tracking-wider text-[11px]">Duration (Days)</label>
                        <input type="number" id="edit-days" class="w-full border border-zinc-200 rounded-lg p-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all">
                    </div>
                    <div>
                        <label class="block text-zinc-500 font-medium mb-1 uppercase tracking-wider text-[11px]">Budget</label>
                        <input type="text" id="edit-budget" class="w-full border border-zinc-200 rounded-lg p-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-zinc-500 font-medium mb-1 uppercase tracking-wider text-[11px]">Accommodation</label>
                        <input type="text" id="edit-hotel" class="w-full border border-zinc-200 rounded-lg p-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all">
                    </div>
                    <div>
                        <label class="block text-zinc-500 font-medium mb-1 uppercase tracking-wider text-[11px]">Occupancy</label>
                        <input type="text" id="edit-occupany" class="w-full border border-zinc-200 rounded-lg p-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-zinc-500 font-medium mb-1 uppercase tracking-wider text-[11px]">Total Travelers</label>
                        <input type="number" id="edit-people" class="w-full border border-zinc-200 rounded-lg p-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all">
                    </div>
                    <div>
                        <label class="block text-zinc-500 font-medium mb-1 uppercase tracking-wider text-[11px]">Adults</label>
                        <input type="number" id="edit-adults" class="w-full border border-zinc-200 rounded-lg p-2.5 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all">
                    </div>
                </div>
            </form>
        </div>

        <div class="px-6 py-4 bg-zinc-50 border-t border-zinc-200 flex justify-end gap-3">
            <button onclick="toggleModal()" class="px-5 py-2.5 text-sm font-bold text-zinc-700 bg-white border border-zinc-300 rounded-lg">
                Cancel
            </button>
            <button onclick="saveEdit()" class="px-5 py-2.5 text-sm font-bold text-white bg-brand rounded-lg shadow-sm">
                Save Updates
            </button>
        </div>
    </div>
</div>

<script>
   

// Close on clicking the backdrop
document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) toggleModal();
}); 
let step = 0;
let data = {};

function quick(t) {
    document.getElementById("startInput").value = t;
}

function startChat() {
    let text = document.getElementById("startInput").value;
    if(text) startChatQ({ innerHTML: text });
}

function startChatQ(x) {
    let val = x.innerHTML;
    
    document.getElementById("start").style.display = "none";
    document.getElementById("chat").style.display = "flex";

    bot("Let's plan your trip. Which country are you visiting?", 0);
    addUser(val);
    step = 1;
    logic(val);
}

function addUser(t) {
    let d = document.createElement("div");
    d.className = "max-w-[600px] py-[14px] px-[18px] leading-[1.6] bg-brand text-white self-end rounded-[16px_3px_16px_16px]";
    d.innerText = t;
    document.getElementById("messages").appendChild(d);
    scroll();
}

function bot(t, x = 1200) {
    let m = document.createElement("div");
    m.className = "max-w-[600px] py-[14px] px-[18px] rounded-[3px_16px_16px_16px] bg-[#f5f5f5]";

    m.innerHTML = `<div class="flex gap-[5px] items-center">
        <div class="w-[7px] h-[7px] bg-brand rounded-full animate-blink"></div>
        <div class="w-[7px] h-[7px] bg-brand rounded-full animate-blink" style="animation-delay: 0.2s"></div>
        <div class="w-[7px] h-[7px] bg-brand rounded-full animate-blink" style="animation-delay: 0.4s"></div>
    </div>`;

    document.getElementById("messages").appendChild(m);
    scroll();

    setTimeout(() => {
        m.innerHTML = t;
        scroll();
    }, x);
}

function populateSgts(arr, multiple=false) {
    document.getElementById('sgts').innerHTML = '';
    setTimeout(() => {
        for(let i = 0; i < arr.length; i++) {
            document.getElementById('sgts').innerHTML += `<button class="border border-black bg-white hover:bg-brand py-[10px] px-[18px] rounded-[8px] cursor-pointer" onclick="fillFit(this,${multiple})">${arr[i]}</button>`;
        }     
    }, 1400);
}

function fillFit(elem,m) {
    var comma = document.getElementById('chatInput').value == ''?"":", "
    document.getElementById('chatInput').value += comma+elem.innerText;
    if(!m){
        send()
    }
}

function send() {
    let v = document.getElementById("chatInput").value;
    if (!v) return;

    addUser(v);
    document.getElementById("chatInput").value = "";
    logic(v);
}
function logic(v) {
    if (step == 1) {
        data.country = v;
        step++;
        populateSgts(['Historical', 'Adventure', 'Workshops', 'Safari', 'Beach'],true);
        bot("What activities are you interested in?");
    } else if (step == 2) {
        data.activities = v;
        step++;
        populateSgts([1, 2, 3, 7, 10, 14]);
        bot("How many days will you stay?");
    } 
    else if (step == 3) {
        data.days = v;
        step++;
        populateSgts(['3 star', '4 star', '5 star', 'Apartment', 'Family stay']);
        bot("Preferred accommodation?");
    }
    else if (step == 4) {
        data.hotel = v;
        step++;
        populateSgts(['Single', 'Shared']);
        bot("Do you need single or shared accomodation?");
    }
 
 else if (step == 5) {
    data.occupany = v;
    step++;
    populateSgts([1, 2, 3, 4, 5]);
    bot("How many travelers?");
}
 else if (step == 6) {
    data.people = v;
    step++;
    populateSgts([1, 2, 3, 4, 5]);
    bot("How many of those are adults?");
}
 else if (step == 7) {
    data.adults = v;
    step++;
    // Added dollar signs to the suggestions for better formatting
    populateSgts(['$1,000', '$3,000', '$5,000', '$10,000+']); 
    bot("What is your budget range?");
} else {
    // Capture the budget input before generating
    data.budget = v; 
    generate();
}
}

function generate() {
    populateSgts([]);

    // Check if the itinerary card already exists
    let existingCard = document.getElementById("final-itinerary");
    
    if (!existingCard) {
        bot("Generating your personalized itinerary...");
    } else {
        bot("Updating your itinerary...");
    }

    setTimeout(() => {
        let m = existingCard;
        
        // If it doesn't exist, create it and append it to the messages
        if (!m) {
            m = document.createElement("div");
            m.id = "final-itinerary";
            m.className = "max-w-[600px] w-full py-[20px] px-[24px] rounded-[3px_16px_16px_16px] bg-[#f5f5f5]";
            document.getElementById("messages").appendChild(m);
        }

        // Inject or update the HTML content
        m.innerHTML = `
            <div class="font-extrabold text-[18px] text-brand mb-[15px]">
                ✈️ ${data.days}-Day Escape to ${data.country}
            </div>
            
            <div class="grid grid-cols-2 gap-[10px] mb-[20px] p-[15px] bg-white rounded-[8px] border border-[#e5e5e5] text-[13px]">
                <div><span class="text-gray-500 text-[11px] block uppercase tracking-wider">Focus</span><span class="font-bold">${data.activities}</span></div>
                <div><span class="text-gray-500 text-[11px] block uppercase tracking-wider">Stay</span><span class="font-bold">${data.hotel} (${data.occupany} Accommodation)</span></div>
                <div><span class="text-gray-500 text-[11px] block uppercase tracking-wider">Travelers</span><span class="font-bold">${data.people} (${data.adults} Adults)</span></div>
                <div><span class="text-gray-500 text-[11px] block uppercase tracking-wider">Budget</span><span class="font-bold text-green-600">${data.budget}</span></div>
            </div>

            <div class="flex gap-3">
                <button class="mt-[20px] w-1/2 bg-gray-200 text-black py-[12px] px-[18px] rounded-[8px] font-bold cursor-pointer" onclick="toggleModal()">
                    Edit
                </button>
                <button class="mt-[20px] w-1/2 bg-brand text-white py-[12px] px-[18px] rounded-[8px] font-bold cursor-pointer" onclick="alert('Itinerary Saved!')">
                    Save Itinerary
                </button>
            </div>            
            
            <div class="text-center text-gray-400 mt-[12px]">
                Our travel representative will contact you shortly to finalize the booking.
            </div>
        `;

        scroll();
    }, 2000);
}
function scroll() {
    let messages = document.getElementById("messages");
    messages.scrollTop = messages.scrollHeight;
}
function toggleModal() {
    const modal = document.getElementById('modalOverlay');
    const isHidden = modal.classList.contains('hidden');
    
    modal.classList.toggle('hidden');
    
    if (isHidden) {
        // Modal is opening: Disable scroll and populate form with global 'data'
        document.body.style.overflow = 'hidden';
        if (data && Object.keys(data).length > 0) {
            document.getElementById('edit-country').value = data.country || '';
            document.getElementById('edit-activities').value = data.activities || '';
            document.getElementById('edit-days').value = data.days || '';
            document.getElementById('edit-hotel').value = data.hotel || '';
            document.getElementById('edit-occupany').value = data.occupany || '';
            document.getElementById('edit-people').value = data.people || '';
            document.getElementById('edit-adults').value = data.adults || '';
            document.getElementById('edit-budget').value = data.budget || '';
        }
    } else {
        // Modal is closing: Restore scroll
        document.body.style.overflow = 'auto';
    }
}

// Map the form inputs back to the global data object and regenerate the view
function saveEdit() {
    data.country = document.getElementById('edit-country').value;
    data.activities = document.getElementById('edit-activities').value;
    data.days = document.getElementById('edit-days').value;
    data.hotel = document.getElementById('edit-hotel').value;
    data.occupany = document.getElementById('edit-occupany').value;
    data.people = document.getElementById('edit-people').value;
    data.adults = document.getElementById('edit-adults').value;
    data.budget = document.getElementById('edit-budget').value;
    
    toggleModal();
    generate(); // Re-render the itinerary chat block with updated info
}
</script>

</body>
</html>
